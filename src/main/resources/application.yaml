spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5433/swarmDB
    username: swarm
    password: "0000"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ✅ [Jackson] 날짜 ISO 8601 포맷 보장 (타임스탬프 숫자 직렬화 방지)
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: Asia/Seoul
    date-format: "yyyy-MM-dd'T'HH:mm:ssXXX"

server:
  port: 8080